<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employee Registration</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#89f7fe,#66a6ff);
}

.container {
    width: 400px;
    background: white;
    padding: 25px;
    margin: 80px auto;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

h2 {
    text-align: center;
    color: #333;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
}

button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>

</head>
<body>

<div class="container">
    <h2>Employee Registration</h2>

    <form th:action="@{/saveEmployee}" th:object="${employee}" method="post">

        <label>Employee ID</label>
        <input type="number" th:field="*{eId}" placeholder="Enter Employee ID" required>

        <label>Name</label>
        <input type="text" th:field="*{name}" placeholder="Enter Name" required>

        <label>Address</label>
        <input type="text" th:field="*{address}" placeholder="Enter Address" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Enter Email" required>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
